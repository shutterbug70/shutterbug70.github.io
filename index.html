<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vineet Mathur</title>
    <link rel="stylesheet" href="style.css">
<style>
  .slideshow {
    width: 100%;
    height: 80vh;
    position: relative;
  }
  .slide {
    display: none;
    max-width: 100%;
    max-height: 80vh;
    object-fit: contain;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
  }
  .slide.active { display: block; }
  .counter {
    margin-top: 1rem;
    display: block;
    text-align: center;
    font-size: 0.75rem;
    color: #888;
    letter-spacing: 0.1em;
    font-family: Georgia, serif;
  }
</style>
</head>
<body>
    <nav class="sidebar">
        <h1>VINEET MATHUR</h1>
        <ul>
            <li><a href="mailto:shutterbug70@gmail.com">shutterbug70@gmail.com</a></li>
        </ul>
    </nav>

    <main class="content">
        <div class="slideshow">
            <img src="beach_football.jpg" alt="" class="slide active">
            <img src="india_beach.jpg" alt="" class="slide">
            <img src="jetty.jpg" alt="" class="slide">
            <img src="L1009656.jpg" alt="" class="slide">
            <img src="misty_cove.jpg" alt="" class="slide">
            <img src="ocean_beach_sunset.jpg" alt="" class="slide">
            <img src="yosemite_couple.jpg" alt="" class="slide">
            <img src="fisherman.jpg" alt="" class="slide">
            <img src="foggy_path.jpg" alt="" class="slide">
            <img src="silicon_valley_hilltop.jpg" alt="" class="slide">
            <img src="forest_figures.jpg" alt="" class="slide">
            <img src="headland_silhouette.jpg" alt="" class="slide">
            <img src="oak_tunnel.jpg" alt="" class="slide">
            <img src="oak_arch_cathedral.jpg" alt="" class="slide">
            <img src="child_valley_path.jpg" alt="" class="slide">
            <img src="blue_ponchos_alpine.jpg" alt="" class="slide">
            <img src="figure_arms_raised.jpg" alt="" class="slide">
            <img src="photographer_on_rocks.jpg" alt="" class="slide">
            <img src="sunset.jpeg" alt="" class="slide">
            <img src="moore_sculpture.jpg" alt="" class="slide">
            <img src="shadow_man_bw.jpg" alt="" class="slide">
            <img src="dunne.jpeg" alt="" class="slide">
            <img src="atm_women_sf.jpg" alt="" class="slide">
            <img src="liqui.jpeg" alt="" class="slide">
            <img src="covid_masks_chinatown.jpg" alt="" class="slide">
            <img src="india_tyre_boy.jpg" alt="" class="slide">
        </div>
        <span class="counter" id="counter">1 / 26</span>
    </main>

<script>
  const slides = document.querySelectorAll('.slide');
  let cur = 0;

  function showSlide(n) {
    slides[cur].classList.remove('active');
    cur = (n + slides.length) % slides.length;
    slides[cur].classList.add('active');
    document.getElementById('counter').textContent = (cur + 1) + ' / ' + slides.length;
  }

  slides.forEach(img => {
    img.addEventListener('click', () => showSlide(cur + 1));
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') showSlide(cur + 1);
    if (e.key === 'ArrowLeft') showSlide(cur - 1);
  });

  let touchStartX = 0;
  document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
  document.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) showSlide(diff > 0 ? cur + 1 : cur - 1);
  });
</script>
</body>
</html>
